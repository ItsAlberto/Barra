<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Barra · Comandas</title>

<!-- PWA / iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barra">
<meta name="theme-color" content="#1a1512">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231a1512'/%3E%3Cpath d='M55 50h70l-30 38v40h16v8H69v-8h16V88z' fill='none' stroke='%23e6a65d' stroke-width='7' stroke-linejoin='round'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#1a1512;
    --bg2:#211b16;
    --card:#2a221c;
    --card2:#332a22;
    --line:#3d3128;
    --txt:#f3e9df;
    --muted:#a08d7c;
    --accent:#e6a65d;
    --accent-d:#c77b49;
    --green:#7bb46a;
    --green-d:#5c9a4e;
    --red:#d97a6b;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:
      radial-gradient(120% 70% at 80% -10%, rgba(230,166,93,.10), transparent 60%),
      radial-gradient(100% 60% at 0% 110%, rgba(199,123,73,.08), transparent 55%),
      var(--bg);
    color:var(--txt);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
    user-select:none;
  }
  .app{
    max-width:560px;margin:0 auto;min-height:100%;
    padding-top:var(--safe-top);
    display:flex;flex-direction:column;
  }
  /* ---------- Header ---------- */
  header{
    padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .glass{width:34px;height:34px;flex:none}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:.2px;line-height:1}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:2px;text-transform:capitalize}
  .live{font-size:12px;color:var(--muted);text-align:right;font-weight:600}
  .live b{display:block;font-family:'Fraunces',serif;color:var(--accent);font-size:19px;font-weight:600}

  /* ---------- Views ---------- */
  main{flex:1;padding:4px 14px 120px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-title{
    font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--accent);
    text-transform:uppercase;letter-spacing:.14em;margin:18px 4px 10px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---------- Mesas grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .table-card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:14px 10px;text-align:center;cursor:pointer;position:relative;
    transition:transform .12s ease, border-color .2s;min-height:92px;
    display:flex;flex-direction:column;justify-content:center;gap:4px;
  }
  .table-card:active{transform:scale(.95)}
  .table-card .tn{font-family:'Fraunces',serif;font-size:24px;font-weight:600;line-height:1}
  .table-card .ts{font-size:11px;color:var(--muted);font-weight:600}
  .table-card.busy{border-color:var(--accent);background:linear-gradient(160deg,var(--card2),var(--card))}
  .table-card.busy .amt{color:var(--accent);font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .dot{position:absolute;top:11px;right:11px;width:9px;height:9px;border-radius:50%;background:var(--line)}
  .table-card.busy .dot{background:var(--accent);box-shadow:0 0 0 4px rgba(230,166,93,.18)}

  /* ---------- Buttons ---------- */
  .btn{
    border:none;border-radius:14px;padding:15px 18px;font-family:inherit;font-size:16px;
    font-weight:700;cursor:pointer;color:var(--bg);background:var(--accent);width:100%;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s, filter .15s}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:transparent;color:var(--txt);border:1.5px solid var(--line)}
  .btn.green{background:var(--green);color:#10210b}
  .btn.red{background:transparent;border:1.5px solid var(--red);color:var(--red)}
  .btn.sm{padding:11px 14px;font-size:14px;border-radius:12px;width:auto}

  /* ---------- Bill (overlay) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,8,6,.6);backdrop-filter:blur(6px);
    z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex;animation:fade .2s ease}
  .sheet{
    background:var(--bg2);width:100%;max-width:560px;border-radius:26px 26px 0 0;
    border-top:1px solid var(--line);max-height:92vh;display:flex;flex-direction:column;
    padding-bottom:var(--safe-bot);animation:slideup .28s cubic-bezier(.22,1,.36,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet-head{padding:16px 18px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .sheet-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:22px}
  .x{background:var(--card);border:none;color:var(--txt);width:38px;height:38px;border-radius:12px;font-size:20px;cursor:pointer}
  .sheet-body{overflow-y:auto;padding:6px 18px;-webkit-overflow-scrolling:touch}
  .sheet-foot{padding:14px 18px;border-top:1px solid var(--line);background:var(--bg2)}

  .line-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .line-item .name{flex:1;font-weight:600;font-size:15px}
  .line-item .price{color:var(--muted);font-size:12.5px;font-weight:600}
  .stepper{display:flex;align-items:center;gap:0;background:var(--card);border-radius:11px;overflow:hidden}
  .stepper button{width:36px;height:36px;border:none;background:none;color:var(--accent);font-size:20px;font-weight:700;cursor:pointer}
  .stepper button:active{background:var(--card2)}
  .stepper span{min-width:26px;text-align:center;font-weight:700;font-family:'Fraunces',serif}
  .li-total{min-width:62px;text-align:right;font-weight:700;font-family:'Fraunces',serif;font-size:15px}

  .carta{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:4px 0 6px}
  .prod-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 12px;cursor:pointer;transition:transform .12s;
    display:flex;flex-direction:column;justify-content:center;min-height:72px;text-align:left}
  .prod-card:active{transform:scale(.96);border-color:var(--accent)}
  .prod-card .pname{font-size:14px;font-weight:700;line-height:1.2;margin-bottom:4px}
  .prod-card .pprice{color:var(--accent);font-family:'Fraunces',serif;font-weight:700;font-size:16px}

  .total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .total-row .lbl{color:var(--muted);font-weight:600;font-size:14px}
  .total-row .val{font-family:'Fraunces',serif;font-weight:700;font-size:34px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ---------- Inputs ---------- */
  input[type=text],input[type=number]{
    background:var(--card);border:1.5px solid var(--line);color:var(--txt);border-radius:12px;
    padding:13px 14px;font-family:inherit;font-size:16px;font-weight:600;width:100%;outline:none}
  input:focus{border-color:var(--accent)}
  .field{display:flex;gap:8px;align-items:center;margin:10px 0}

  /* mini panel inside sheet */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:10px}
  .big-num{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--accent)}
  .split-people{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0}
  .split-people button{width:44px;height:44px;border-radius:13px;border:none;background:var(--card2);color:var(--accent);font-size:24px;font-weight:700;cursor:pointer}
  .split-people .n{font-family:'Fraunces',serif;font-size:30px;font-weight:700;min-width:40px;text-align:center}

  /* ---------- Tareas ---------- */
  .task{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:opacity .2s}
  .task .check{width:26px;height:26px;border-radius:8px;border:2px solid var(--muted);flex:none;
    display:flex;align-items:center;justify-content:center;transition:.2s;color:transparent;font-weight:900;font-size:15px}
  .task.done .check{background:var(--green);border-color:var(--green);color:#10210b}
  .task .ttxt{flex:1;font-weight:600;font-size:15px}
  .task.done .ttxt{color:var(--muted);text-decoration:line-through}
  .task .del{color:var(--muted);background:none;border:none;font-size:18px;padding:4px;cursor:pointer}
  .progress{height:7px;background:var(--card);border-radius:99px;overflow:hidden;margin:2px 4px 8px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-d),var(--accent));border-radius:99px;transition:width .4s}

  /* ---------- Ajustes ---------- */
  .setting{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:10px}
  .setting label{display:block;font-weight:600;font-size:14px;margin-bottom:8px}
  .menu-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
  .menu-row .mn{flex:1;font-weight:600;font-size:14.5px}
  .menu-row .mp{color:var(--accent);font-weight:700;font-family:'Fraunces',serif;font-size:14.5px}
  .menu-row .del{color:var(--red);background:none;border:none;font-size:18px;cursor:pointer;padding:2px 6px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-weight:500}
  .empty .em{font-size:40px;display:block;margin-bottom:10px;opacity:.6}

  /* ---------- Categorías ---------- */
  .cattabs{display:flex;gap:7px;overflow-x:auto;padding:2px 0 9px;-webkit-overflow-scrolling:touch}
  .cattabs::-webkit-scrollbar{display:none}
  .cattab{flex:none;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:8px 16px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer}
  .cattab.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .cat-h{font-family:'Fraunces',serif;font-size:12px;font-weight:600;color:var(--accent);
    text-transform:uppercase;letter-spacing:.12em;margin:14px 0 4px}
  .table-card .tnm{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;padding:0 3px}
  .pencil{color:var(--muted);font-size:15px}
  #billTitle{cursor:pointer}
  select{background:var(--card);border:1.5px solid var(--line);color:var(--txt);border-radius:12px;
    padding:13px 14px;font-family:inherit;font-size:16px;font-weight:600;width:100%;outline:none;
    -webkit-appearance:none;appearance:none}
  select:focus{border-color:var(--accent)}

  /* ---------- Rondas ---------- */
  .ronda{border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;background:var(--card)}
  .ronda.por-servir{border-color:var(--accent);background:linear-gradient(160deg,var(--card2),var(--card))}
  .ronda.servida{opacity:.5}
  .ronda-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px}
  .ronda-head .rl{font-family:'Fraunces',serif;font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px}
  .ronda-head .rt{color:var(--muted);font-size:11.5px;font-weight:700;text-align:right;flex:none}
  .ronda .ri{display:flex;justify-content:space-between;font-size:14.5px;font-weight:600;padding:3px 0}
  .ronda .ri .q{color:var(--accent);font-family:'Fraunces',serif;margin-right:7px}
  .ronda-act{display:flex;gap:8px;margin-top:10px}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px}
  .badge.serv{background:rgba(123,180,106,.18);color:var(--green)}

  /* ---------- Comandero / Pendiente ---------- */
  .pend-sec{border-radius:20px;overflow:hidden;margin-bottom:16px;border:1px solid var(--line)}
  .pend-sec-head{
    display:flex;align-items:center;gap:10px;padding:13px 16px;
    background:var(--card2);border-bottom:1px solid var(--line)}
  .pend-sec-head .ico{font-size:20px;line-height:1}
  .pend-sec-head .tit{font-family:'Fraunces',serif;font-size:17px;font-weight:600;flex:1}
  .pend-sec-head .cnt{background:var(--accent);color:var(--bg);font-family:'Fraunces',serif;
    font-weight:700;font-size:13px;padding:3px 10px;border-radius:99px}
  .cmd-mesa{border-bottom:1px solid var(--line)}
  .cmd-mesa:last-child{border-bottom:none}
  .cmd-mesa-head{display:flex;align-items:center;justify-content:space-between;
    padding:11px 16px 6px;font-size:12.5px;font-weight:700;color:var(--muted)}
  .cmd-item{display:flex;justify-content:space-between;align-items:center;
    padding:9px 16px;font-size:15px;font-weight:600}
  .cmd-item .q{color:var(--accent);font-family:'Fraunces',serif;font-weight:700;margin-right:7px;font-size:17px}
  .cmd-serv{padding:10px 16px;border-top:1px solid var(--line);background:var(--bg2)}
  .all-good{text-align:center;padding:50px 20px;color:var(--muted)}
  .all-good .em{font-size:52px;display:block;margin-bottom:12px}
  .all-good b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--txt);margin-bottom:6px}
  .tab-badge{background:var(--accent);color:var(--bg);font-size:9px;font-weight:900;
    padding:1px 5px;border-radius:99px;position:absolute;top:4px;right:50%;transform:translateX(140%)}
  /* ---------- Tab bar ---------- */
  nav{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:rgba(26,21,18,.86);backdrop-filter:blur(16px);border-top:1px solid var(--line);
    display:flex;max-width:560px;margin:0 auto;padding:8px 8px calc(8px + var(--safe-bot))}
  nav button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;
    font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;position:relative}
  nav button.active{color:var(--accent)}
  nav svg{width:24px;height:24px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green);color:#10210b;padding:13px 22px;border-radius:14px;font-weight:700;
    box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:60;pointer-events:none;font-size:14.5px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <svg class="glass" viewBox="0 0 48 48" fill="none"><path d="M13 11h22l-9 12v12h5v3H17v-3h5V23z" stroke="#e6a65d" stroke-width="2.4" stroke-linejoin="round"/></svg>
      <div>
        <h1>Mi Barra</h1>
        <small id="dateLabel">—</small>
      </div>
    </div>
    <div class="live">Caja activa<b id="liveTotal">0,00 €</b></div>
  </header>

  <main>
    <!-- ============ MESAS ============ -->
    <section class="view active" id="view-mesas">
      <div class="section-title">Mesas y barra</div>
      <div class="grid" id="tablesGrid"></div>
    </section>

    <!-- ============ TAREAS ============ -->
    <section class="view" id="view-tareas">
      <div class="section-title">Rutina de hoy</div>
      <div class="progress"><i id="taskBar" style="width:0%"></i></div>
      <div id="tasksWrap"></div>
      <button class="btn ghost sm" style="width:100%;margin-top:6px" onclick="addTaskPrompt()">+ Añadir tarea</button>
    </section>

    <!-- ============ AJUSTES ============ -->
    <section class="view" id="view-ajustes">
      <div class="section-title">Carta rápida</div>
      <div class="setting">
        <div id="menuList"></div>
        <div class="field" style="margin-top:12px">
          <input type="text" id="newProdName" placeholder="Producto (ej: Caña)">
          <input type="number" id="newProdPrice" placeholder="€" inputmode="decimal" style="max-width:90px">
        </div>
        <div class="field" style="margin:0 0 6px">
          <select id="newProdCat"></select>
        </div>
        <button class="btn sm" style="width:100%" onclick="addProduct()">+ Añadir producto</button>
      </div>

      <div class="section-title">Categorías</div>
      <div class="setting">
        <div id="catList"></div>
        <div class="field" style="margin-top:10px">
          <input type="text" id="newCatName" placeholder="Nueva categoría…">
          <button class="btn sm" onclick="addCategory()">+ Crear</button>
        </div>
      </div>

      <div class="section-title">Configuración</div>
      <div class="setting">
        <label>Número de mesas / barras</label>
        <div class="field" style="margin:0">
          <input type="number" id="tableCount" inputmode="numeric" min="1" max="60">
          <button class="btn sm" onclick="setTableCount()">Aplicar</button>
        </div>
      </div>
      <div class="setting">
        <label>Empezar día nuevo</label>
        <p style="color:var(--muted);font-size:13px;margin-bottom:10px">Libera todas las mesas y reinicia la rutina. Úsalo al abrir el turno.</p>
        <button class="btn red sm" style="width:100%" onclick="newDay()">Cerrar turno y empezar de cero</button>
      </div>
    </section>
    <!-- ============ PENDIENTE ============ -->
    <section class="view" id="view-pendiente">
      <div class="section-title">Por servir ahora</div>
      <div id="pendienteWrap"></div>
    </section>

  </main>

  <nav>
    <button class="active" data-view="mesas" onclick="go('mesas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M9 18v2M15 18v2"/></svg>Mesas</button>
    <button data-view="pendiente" onclick="go('pendiente')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
      Pendiente<span id="pendBadge" class="tab-badge" style="display:none">0</span></button>
    <button data-view="tareas" onclick="go('tareas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>Rutina</button>
    <button data-view="ajustes" onclick="go('ajustes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg>Ajustes</button>
  </nav>
</div>

<!-- ===== Overlay cuenta de mesa ===== -->
<div class="overlay" id="billOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="billTitle" onclick="renameTable()">Mesa</h2>
      <button class="x" onclick="closeBill()">✕</button>
    </div>
    <div class="sheet-body" id="billBody"></div>
    <div class="sheet-foot" id="billFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ALMACENAMIENTO (localStorage en el iPhone, memoria de respaldo)
   ========================================================= */
const Store = (() => {
  let mem = {}, hasLS = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); hasLS = true; } catch(e) {}
  return {
    get(k){ try { return hasLS ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { hasLS ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } }
  };
})();

let state = load();
function load(){
  try{ const s=JSON.parse(Store.get(KEY)); if(s&&s.config){
    if(!s.cats||!s.cats.length) s.cats=['Cervezas','Refrescos','Vinos','Copas','Ensaladas','Hamburguesas','Sándwiches','Bocadillos','Perritos','Cocina'];
    (s.menu||[]).forEach(p=>{ if(!p.cat) p.cat=s.cats[0]; });
    Object.values(s.tables||{}).forEach(tb=>{
      if(!tb.rounds) tb.rounds=[];
      if(!tb.pending) tb.pending = tb.items || [];
      delete tb.items;
    });
    return s;
  } }catch(e){}
  return defaultState();
}
function ensureCurCat(){ if(!curCat||!cats().includes(curCat)) curCat=cats()[0]||''; }

/* =========================================================

const eur = n => (n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
function tableTotal(tb){
  if(!tb) return 0;
  const sum=arr=>(arr||[]).reduce((s,i)=>s+i.price*i.qty,0);
  return sum(tb.pending) + (tb.rounds||[]).reduce((s,r)=>s+sum(r.items),0);
}
function liveTotal(){ return Object.values(state.tables).reduce((s,tb)=>s+tableTotal(tb),0); }
function toast(msg){ const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('show'),1800); }

function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  if(v==='tareas') renderTasks();
  if(v==='ajustes') renderSettings();
  if(v==='mesas') renderTables();
  if(v==='pendiente') renderPendiente();
}

function renderTables(){
  const g=document.getElementById('tablesGrid'); g.innerHTML='';
  const n=state.config.tableCount;
  for(let i=1;i<=n;i++){
    const tb=state.tables[i]; const busy=tb&&(tb.rounds.length||tb.pending.length);
    const d=document.createElement('div');
    d.className='table-card'+(busy?' busy':'');
    d.onclick=()=>openBill(i);
    const label = (tb&&tb.name) ? `<span class="tnm">${tb.name}</span>` : `<span class="tn">${i}</span>`;
    d.innerHTML=`<span class="dot"></span>
      ${label}
      ${busy?`<span class="amt">${eur(tableTotal(tb))}</span>`:`<span class="ts">Libre</span>`}`;
    g.appendChild(d);
  }
  document.getElementById('liveTotal').textContent=eur(liveTotal());
}

}
function renameTable(){

}
function closeBill(){
  const tb=state.tables[current];
  if(tb && !tb.rounds.length && !tb.pending.length) delete state.tables[current];

  document.getElementById('billOverlay').classList.remove('show');
  document.body.style.overflow='';
  renderTables();
}
function renderBill(){
  const id=current, tb=state.tables[id]; const total=tableTotal(tb);

  const rounds = (tb.rounds||[]).map((r,ri)=>{

    ${rounds ? `<div class="section-title" style="margin-top:6px">Comandas confirmadas</div>${rounds}` : ''}

      <input type="text" id="cName" placeholder="Otro producto…">

      <button class="btn sm" onclick="addCustom()">+</button>

  foot.innerHTML = `
    <div class="total-row"><span class="lbl">Total mesa</span><span class="val">${eur(total)}</span></div>
    <div class="row2">
      <button class="btn ghost" ${total?'':'disabled style=opacity:.4'} onclick="mode='split';renderBill()">Dividir</button>
      <button class="btn green" ${total?'':'disabled style=opacity:.4'} onclick="mode='charge';renderBill()">Cobrar</button>

}
function addItem(i){
  const p=state.menu[i], tb=state.tables[current];
  const ex=tb.pending.find(x=>x.name===p.name && x.price===p.price);
  ex ? ex.qty++ : tb.pending.push({name:p.name,price:p.price,qty:1,cat:p.cat||'Bebidas'});

}
function addCustom(){

function chgQty(idx,d){

}
function confirmRound(){
  const tb=state.tables[current];
  if(!tb.pending.length){ toast('Añade algo primero'); return; }
  tb.rounds.push({id:t(),ts:Date.now(),served:false,items:tb.pending});
  tb.pending=[];
  save(); renderBill(); toast('Ronda confirmada · por servir');
}
function renderPendiente(){
  const wrap=document.getElementById('pendienteWrap'); wrap.innerHTML='';

  const BARRA=['Bebidas','Copas'];
  const COCINA=['Cocina','Burguer'];

  // Recopilar rondas pendientes de todas las mesas
  let barra=[], cocina=[];
  Object.entries(state.tables).forEach(([id,tb])=>{
    (tb.rounds||[]).filter(r=>!r.served).forEach(r=>{
      const hora=new Date(r.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      const nombre=tableName(id);
      const itBarra=r.items.filter(i=>BARRA.includes(i.cat)||(![...BARRA,...COCINA].includes(i.cat)));
      const itCocina=r.items.filter(i=>COCINA.includes(i.cat));
      if(itBarra.length) barra.push({id,rid:r.id,nombre,hora,items:itBarra});
      if(itCocina.length) cocina.push({id,rid:r.id,nombre,hora,items:itCocina});
    });
  });

  if(!barra.length && !cocina.length){
    wrap.innerHTML=`<div class="all-good"><span class="em">🎉</span><b>¡Todo servido!</b>No hay nada pendiente por sacar.</div>`;
    return;
  }

  function buildSection(list,ico,tit){
    if(!list.length) return '';
    const total=list.reduce((s,g)=>s+g.items.reduce((a,i)=>a+i.qty,0),0);
    const rows=list.map(g=>{
      const lines=g.items.map(i=>`<div class="cmd-item"><span><span class="q">${i.qty}</span>${i.name}</span></div>`).join('');
      return `<div class="cmd-mesa">
        <div class="cmd-mesa-head"><span>${g.nombre} &nbsp;·&nbsp; Ronda confirmada ${g.hora}</span></div>
        ${lines}
        <div class="cmd-serv"><button class="btn green sm" style="width:100%" onclick="servirRonda('${g.id}','${g.rid}')">Marcar servida ✓</button></div>
      </div>`;
    }).join('');
    return `<div class="pend-sec">
      <div class="pend-sec-head"><span class="ico">${ico}</span><span class="tit">${tit}</span><span class="cnt">${total} uds.</span></div>
      ${rows}
    </div>`;
  }

  wrap.innerHTML = buildSection(barra,'🍺','Barra') + buildSection(cocina,'🍽️','Cocina');
}

function servirRonda(tableId,roundId){
  const tb=state.tables[tableId]; if(!tb) return;
  const r=tb.rounds.find(x=>x.id===roundId); if(!r) return;
  r.served=true; save(); renderPendiente();
  toast('Ronda marcada como servida');
}
function toggleServed(rid){
  const r=state.tables[current].rounds.find(x=>x.id===rid);
  r.served=!r.served; save(); renderBill();

function delRound(rid){
  if(!confirm('¿Eliminar esta ronda de la cuenta?')) return;
  const tb=state.tables[current];
  tb.rounds=tb.rounds.filter(x=>x.id!==rid);
  save(); renderBill();
}

const GROUPS=['Apertura','Servicio','Cierre'];
function renderTasks(){
  const wrap=document.getElementById('tasksWrap'); wrap.innerHTML='';
  const today=todayStr();
  let done=0,tot=state.tasks.length;
  GROUPS.forEach(g=>{
    const list=state.tasks.filter(x=>x.group===g);
    if(!list.length) return;
    const h=document.createElement('div'); h.className='section-title'; h.textContent=g; wrap.appendChild(h);
    list.forEach(task=>{
      const isDone=task.doneDate===today; if(isDone) done++;
      const d=document.createElement('div'); d.className='task'+(isDone?' done':'');
      d.innerHTML=`<div class="check">✓</div><div class="ttxt">${task.text}</div><button class="del" onclick="event.stopPropagation();delTask('${task.id}')">🗑</button>`;
      d.onclick=()=>toggleTask(task.id);
      wrap.appendChild(d);
    });
  });
  document.getElementById('taskBar').style.width=(tot?Math.round(done/tot*100):0)+'%';
}
function toggleTask(id){
  const tk=state.tasks.find(x=>x.id===id); const today=todayStr();
  tk.doneDate = tk.doneDate===today ? null : today;
  save(); renderTasks();
}
function delTask(id){
  state.tasks=state.tasks.filter(x=>x.id!==id); save(); renderTasks();
}
function addTaskPrompt(){
  const txt=prompt('Nueva tarea:'); if(!txt||!txt.trim()) return;
  const g=prompt('Momento — escribe: Apertura, Servicio o Cierre','Servicio')||'Servicio';
  const grp=GROUPS.find(x=>x.toLowerCase()===g.trim().toLowerCase())||'Servicio';
  state.tasks.push({id:t(),text:txt.trim(),group:grp,doneDate:null});
  save(); renderTasks();
}

function renameCategory(old){
  const nw=prompt('Nuevo nombre para la categoría "'+old+'":', old);
  if(!nw||!nw.trim()||nw.trim()===old) return;
  const nwt=nw.trim();
  if(cats().includes(nwt)){ toast('Ese nombre ya existe'); return; }
  state.cats=state.cats.map(c=>c===old?nwt:c);
  state.menu.forEach(p=>{ if(p.cat===old) p.cat=nwt; });
  if(curCat===old) curCat=nwt;
  save(); renderSettings(); toast('Categoría renombrada');
}
function deleteCategory(c){
  if(!confirm('¿Borrar la categoría "'+c+'"?\nLos productos que tiene se quedarán sin categoría asignada.')) return;
  state.cats=state.cats.filter(x=>x!==c);
  if(!state.cats.length) state.cats=['Sin categoría'];
  state.menu.forEach(p=>{ if(p.cat===c) p.cat=state.cats[0]; });
  if(curCat===c) curCat=state.cats[0];
  save(); renderSettings(); toast('Categoría borrada');
}
function addCategory(){
  const inp=document.getElementById('newCatName');
  const nt=(inp?inp.value:'').trim();
  if(!nt){ toast('Escribe un nombre'); return; }
  if(cats().includes(nt)){ toast('Esa categoría ya existe'); return; }
  state.cats.push(nt); if(inp) inp.value='';
  save(); renderSettings(); toast('Categoría "'+nt+'" creada');
}
function addProduct(){
  const n=document.getElementById('newProdName').value.trim();
  const pr=parseFloat((document.getElementById('newProdPrice').value||'').replace(',','.'));
  const c=document.getElementById('newProdCat').value || 'Bebidas';
  if(!n||isNaN(pr)){ toast('Pon nombre y precio'); return; }
  state.menu.push({name:n,price:pr,cat:c}); save();
  document.getElementById('newProdName').value=''; document.getElementById('newProdPrice').value='';
  renderSettings(); toast(n+' → '+c);
}
function delProduct(i){ state.menu.splice(i,1); save(); renderSettings(); }
function setTableCount(){
  let v=parseInt(document.getElementById('tableCount').value);
  if(isNaN(v)||v<1) v=1; if(v>60) v=60;
  state.config.tableCount=v; save(); renderTables(); toast('Mesas: '+v);
}
function newDay(){
  if(!confirm('¿Cerrar turno?\nSe liberan todas las mesas y se reinicia la rutina.')) return;
  state.tables={};
  state.tasks.forEach(t=>t.doneDate=null);
  save(); renderTables(); renderTasks(); renderSettings(); toast('Turno nuevo · todo a cero');
}

/* =========================================================
   INICIO
   ========================================================= */
document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
renderTables();

// Cerrar overlay tocando el fondo
document.getElementById('billOverlay').addEventListener('click',e=>{ if(e.target.id==='billOverlay') closeBill(); });
</script>
